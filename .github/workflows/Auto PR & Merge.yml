name: Auto PR & Merge

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC (7 PM EST)

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update example file
        run: |
          echo "Updated at $(date)" >> update.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Automated update
          branch: auto-update-branch
          base: main
          title: "Automated Update"
          body: "This PR will merge automatically once all checks pass."
          labels: automated
          delete-branch: true

      # Enable auto-merge using GitHub CLI
      - name: Enable auto-merge for the PR
        if: steps.create_pr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --auto "${{ steps.create_pr.outputs.pull-request-number }}"
