name: Auto PR & Merge_2

on:
  schedule:
    - cron: "45 0 * * *"  # 7:45 PM EST (12:45 AM UTC)
  workflow_dispatch:  # Allows manual trigger

jobs:
  auto-pr-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto-update-branch
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Sync with latest main
        run: |
          git fetch origin main
          git rebase origin/main || true

      - name: Make changes
        run: |
          echo "Updated at $(date)" >> update.txt

      - name: Commit and push
        run: |
          git add .
          git commit -m "Automated update" || echo "No changes"
          git push origin auto-update-branch

      - name: Create or update PR
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          branch: auto-update-branch
          base: main
          title: "Automated Update"
          body: "Auto-generated PR with latest changes"
          labels: automated
          delete-branch: true

      - name: Auto-merge PR
        if: steps.create_pr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          gh pr merge --squash --auto ${{ steps.create_pr.outputs.pull-request-number }}
