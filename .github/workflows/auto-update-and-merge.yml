name: Auto Update and Merge

on:
  schedule:
    - cron: "15 1 * * *"  # 8:15 PM EST (1:15 AM UTC)
  workflow_dispatch:  # Allow manual trigger

jobs:
  auto-update-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create or checkout auto-update-branch
        run: |
          git fetch origin
          if git ls-remote --exit-code --heads origin auto-update-branch; then
            git checkout auto-update-branch
            git pull origin auto-update-branch
          else
            git checkout -b auto-update-branch
          fi

      - name: Sync with latest main
        id: sync
        run: |
          git fetch origin main
          if ! git merge origin/main --no-edit; then
            git merge --abort
            echo "merge_failed=true" >> $GITHUB_OUTPUT
            echo "Merge conflict encountered, aborting merge"
          fi

      - name: Make changes
        if: steps.sync.outputs.merge_failed != 'true'
        run: |
          echo "Updated at $(date)" >> update.txt

      - name: Commit and push
        id: commit
        if: steps.sync.outputs.merge_failed != 'true'
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Automated update $(date +'%Y-%m-%d')"
            git push origin auto-update-branch
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR
        id: create_pr
        if: steps.commit.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          branch: auto-update-branch
          base: main
          title: "Automated Update"
          body: "Auto-generated PR with latest changes"
          labels: automated
          delete-branch: true

      - name: Auto-merge PR
        if: steps.create_pr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          gh pr merge --squash --auto ${{ steps.create_pr.outputs.pull-request-number }} || echo "Auto-merge failed or already merged"
